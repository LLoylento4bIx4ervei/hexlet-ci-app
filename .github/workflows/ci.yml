name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install JS
        uses: actions/setup-node@v4
        with: 
          node-version: '18'
    
      - name: Setup project
        run: make setup

      - name: Run linter
        run: make lint

      - name: Run tests
        run: make test

      - name: Hello
        uses: hexlet-components/hello-from-hexlet-action@release 
